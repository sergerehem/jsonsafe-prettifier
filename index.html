<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JSONSafe → JSON Prettify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <style>
    :root { --bg:#0b1020; --card:#121a2f; --muted:#94a3b8; --ok:#22c55e; --err:#ef4444; --txt:#e2e8f0; --accent:#3b82f6; }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:var(--txt)}
    .wrap{max-width:1280px;margin:16px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid #27314f;border-radius:12px;padding:14px}
    h1{font-size:20px;margin:0 0 10px}
    p{margin:6px 0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .io-box{display:flex;flex-direction:column;min-height:calc(100vh - 220px)}
    textarea{width:100%;height:100%;min-height:560px;background:#0a1227;color:#dbeafe;border:1px solid #2a3a66;border-radius:10px;padding:12px;font-family:ui-monospace,Consolas,monospace;font-size:13px;line-height:1.45;resize:vertical}
    pre#outputPre{margin:0;height:100%;min-height:560px;border:1px solid #2a3a66;border-radius:10px;overflow:auto;background:#0a1227;padding:12px}
    pre#outputPre code{font-family:ui-monospace,Consolas,monospace;font-size:13px;line-height:1.45}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    button{border:0;border-radius:8px;padding:10px 14px;font-weight:600;cursor:pointer}
    .primary{background:var(--accent);color:white}
    .ghost{background:#1f2a48;color:#dbeafe}
    .ok{color:var(--ok);font-weight:700}
    .err{color:var(--err);font-weight:700}
    .small{font-size:12px;color:var(--muted)}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.io-box{min-height:unset}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>JSONSafe → JSON formatado (prettify)</h1>
      <p>Cole seu JSON original / JSONSafe no campo da esquerda. A ferramenta tenta converter para JSON válido, formatar e informar se validou.</p>
      <div class="row">
        <button class="primary" id="btnConvert">Converter</button>
        <button class="ghost" id="btnClear">Limpar</button>
        <button class="ghost" id="btnCopy">Copiar resultado</button>
        <button class="ghost" id="btnDownload">Baixar .json</button>
      </div>
      <div id="status" class="small">Status: aguardando</div>
      <div class="grid" style="margin-top:10px">
        <div class="io-box">
          <p><strong>Entrada</strong></p>
          <textarea id="input" placeholder="Cole aqui seu JSON/JSONSafe..."></textarea>
        </div>
        <div class="io-box">
          <p><strong>Saída (JSON prettify)</strong></p>
          <pre id="outputPre" class="language-json"><code id="outputCode" class="language-json">Resultado aparecerá aqui...</code></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id)=>document.getElementById(id);

    function setStatus(ok, msg){
      const el = $('status');
      el.innerHTML = ok
        ? `Status: <span class="ok">VÁLIDO</span> — ${msg}`
        : `Status: <span class="err">INVÁLIDO</span> — ${msg}`;
    }

    function explainJsonError(source, errMsg){
      const m = String(errMsg || '').match(/position\s+(\d+)/i);
      if(!m) return { detail: errMsg, suggestion: 'Verifique aspas, vírgulas e chaves/colchetes.' };

      const pos = Number(m[1]);
      const safePos = Math.max(0, Math.min(source.length - 1, pos));
      const start = Math.max(0, safePos - 45);
      const end = Math.min(source.length, safePos + 45);
      const snippet = source.slice(start, end);
      const pointer = ' '.repeat(safePos - start) + '↑';

      const before = source[safePos - 1] || '';
      const at = source[safePos] || '';
      let suggestion = 'Verifique aspas, vírgulas e chaves/colchetes próximos ao trecho indicado.';

      if(at === "'" || before === "'") suggestion = 'JSON válido exige aspas duplas (") para chaves e textos.';
      else if(at === '}' || at === ']') suggestion = 'Possível vírgula extra antes de fechar objeto/lista. Remova a vírgula final.';
      else if(at === ',' && /\d,\d/.test(source.slice(Math.max(0,safePos-3), safePos+3))) suggestion = 'Se for número decimal, troque vírgula por ponto (ex.: 200,5 -> 200.5).';
      else if(at === '"' && source[safePos+1] && source[safePos+1].trim() && source[safePos+1] !== ',' && source[safePos+1] !== ':' && source[safePos+1] !== '}' && source[safePos+1] !== ']') suggestion = 'Pode haver aspas não escapadas dentro de texto. Escape com \\".';

      const lines = source.slice(0, safePos).split('\n');
      const line = lines.length;
      const col = lines[lines.length-1].length + 1;

      return {
        detail: `${errMsg} (linha ${line}, coluna ${col})\n\nTrecho:\n${snippet}\n${pointer}`,
        suggestion
      };
    }

    function normalizeRaw(raw){
      let s = (raw || '').trim();
      // remove code fences
      s = s.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();

      // if whole payload is a quoted JSON string, decode once
      if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) {
        try { s = JSON.parse(s); } catch(_) {}
      }

      // normalize smart quotes
      s = s.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");

      // common JSONSafe: escaped quotes/newlines in a plain text blob
      if (s.includes('\\"') || s.includes('\\n')) {
        try { s = JSON.parse(`"${s.replace(/"/g,'\\"')}"`); } catch(_) {}
      }

      // convert decimal comma when clearly numeric token outside typical text pattern
      s = s.replace(/(:\s*)(\d+),(\d+)(\s*[,}\]])/g, '$1$2.$3$4');

      // remove trailing commas before } or ]
      s = s.replace(/,\s*([}\]])/g, '$1');

      return s;
    }

    let outputRaw = '';

    function setOutput(text, isJson = false){
      outputRaw = text || '';
      const code = $('outputCode');
      code.textContent = outputRaw;
      code.className = isJson ? 'language-json' : 'language-none';
      if(window.Prism) Prism.highlightElement(code);
    }

    function convert(){
      const raw = $('input').value;
      if (!raw.trim()) { setOutput(''); setStatus(false, 'entrada vazia'); return; }

      const candidate = normalizeRaw(raw);
      try {
        const obj = JSON.parse(candidate);
        const pretty = JSON.stringify(obj, null, 2);
        setOutput(pretty, true);
        setStatus(true, 'JSON convertido e formatado com sucesso');
      } catch (err) {
        const info = explainJsonError(candidate, err.message || String(err));
        setOutput(`ERRO DE VALIDAÇÃO\n\n${info.detail}\n\nSugestão de correção:\n- ${info.suggestion}`, false);
        setStatus(false, err.message);
      }
    }

    $('btnConvert').addEventListener('click', convert);
    $('btnClear').addEventListener('click', ()=>{ $('input').value=''; setOutput('Resultado aparecerá aqui...'); setStatus(false,'aguardando'); });
    $('btnCopy').addEventListener('click', async ()=>{
      if(!outputRaw.trim()) return;
      await navigator.clipboard.writeText(outputRaw);
      setStatus(true,'resultado copiado');
    });
    $('btnDownload').addEventListener('click', ()=>{
      const text = outputRaw;
      if(!text.trim()) return;
      const blob = new Blob([text], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'resultado.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
</body>
</html>
